<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K Logo Preloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom animations not available in Tailwind core */

    /* Blue bar drops in */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px) scaleY(0.5); }
      to   { opacity: 1; transform: translateY(0) scaleY(1); }
    }

    /* Top blade slashes in */
    @keyframes slashIn {
      from { opacity: 0; transform: rotate(18deg) scaleX(0); }
      to   { opacity: 1; transform: rotate(18deg) scaleX(1); }
    }

    /* Bottom blade slashes in */
    @keyframes slashIn2 {
      from { opacity: 0; transform: rotate(-14deg) scaleX(0); }
      to   { opacity: 1; transform: rotate(-14deg) scaleX(1); }
    }

    /* Yellow triangle rises */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Glow pulse after assembly */
    @keyframes glowPulse {
      0%   { filter: none; }
      50%  { filter: drop-shadow(0 0 18px rgba(47,128,194,0.75)) drop-shadow(0 0 10px rgba(245,184,0,0.5)); }
      100% { filter: none; }
    }

    /* Spinning ring */
    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Dot pulse */
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.35; }
      40%            { transform: scale(1.2);  opacity: 1; }
    }

    /* Loading text fade */
    @keyframes textGlow {
      from { color: #444; letter-spacing: 0.25em; }
      to   { color: #999; letter-spacing: 0.3em; }
    }

    .anim-logo   { animation: glowPulse 1.3s ease 1.2s both; }
    .anim-ring   { animation: spinRing  1.4s linear 0.85s infinite; opacity: 0.85; }

    .anim-dot1 { animation: dotBounce 1.2s ease-in-out 0s infinite; }
    .anim-dot2 { animation: dotBounce 1.2s ease-in-out 0.18s infinite; }
    .anim-dot3 { animation: dotBounce 1.2s ease-in-out 0.36s infinite; }

    .anim-text { animation: textGlow 1.8s ease-in-out infinite alternate; }

  </style>
</head>
<body >

  <!-- Preloader Card -->
<div class="bg-black min-h-screen flex flex-col items-center justify-center gap-8">
  <div class="flex flex-col items-center gap-8 rounded-2xl border border-white/5">

    <!-- Logo Mark -->
    <div class="relative w-28 h-28 anim-logo" id="logoWrap">

      <!-- Spinning Ring -->
      <div class="anim-ring absolute inset-[-16px] rounded-full border-[2.5px] border-transparent"
           style="border-top-color:#2F80C2; border-right-color:#F5B800;"></div>

      <img src="./assests/img/logo/logo.svg" alt="">
    </div>

    <!-- Dot Loader -->
    <div class="flex items-center gap-2">
      <div class="anim-dot1 w-2 h-2 rounded-full bg-[#2F80C2]"></div>
      <div class="anim-dot2 w-2 h-2 rounded-full bg-[#C8C8C8]"></div>
      <div class="anim-dot3 w-2 h-2 rounded-full bg-[#F5B800]"></div>
    </div>

    <!-- Loading Text -->
    <p class="anim-text text-[11px] font-medium tracking-[0.25em] uppercase text-neutral-500">
      Loading
    </p>

  </div>
</div>    
  <script>
    function replayAnim() {
      const wrap = document.getElementById('logoWrap');
      const clone = wrap.cloneNode(true);
      wrap.parentNode.replaceChild(clone, wrap);
    }
  </script>

</body>
</html>
